name: Dispatch stack deploy

on:
  push:
    branches:
      - main
    paths:
      - "stacks/**"

permissions:
  contents: read
  actions: write

jobs:
  detect-and-dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed stack folder
        id: stacks
        shell: bash
        run: |
          changed_stack=$(
            git diff --name-only HEAD~1 HEAD \
              | awk -F/ '/^stacks\/[^/]+\/.*\.ya?ml$/ {print $2}' \
              | sort -u
          )

          echo "Changed stacks:"
          echo "$changed_stack"

          {
            echo "stack_names<<EOF"
            echo "$changed_stack"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch deploy workflow
        if: steps.stacks.outputs.stack_names != ''
        uses: actions/github-script@v7
        with:
          script: |
            const stacks = `${{ steps.stacks.outputs.stack_names }}`
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            for (const stack of stacks) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deploy-stack.yml',
                ref: 'main',
                inputs: {
                  stack_name: stack
                }
              });

              core.info(`Dispatched deploy-stack.yml for stack: ${stack}`);
            }