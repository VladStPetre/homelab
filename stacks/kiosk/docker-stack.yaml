---
services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    volumes:
      - /srv/dvls/uptime-data:/app/data
    environment:
      - TZ=${TIMEZONE}
      - UMASK=0022
    networks:
      - hlel
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.labels.role == secondary
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.uptime.rule=Host(`uptime.${DOMAIN_NAME}`)"
        - "traefik.http.routers.uptime.entrypoints=websecure"
        - "traefik.http.routers.uptime.tls=true"
        - "traefik.http.routers.uptime.tls.certresolver=cloudflare"
        - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  semaphore:
    image: semaphoreui/semaphore:v2.18.10
    environment:
      - SEMAPHORE_DB_DIALECT=sqlite
      - SEMAPHORE_DB=/etc/semaphore/semaphore.db
      - SEMAPHORE_PLAYBOOK_PATH=/tmp/semaphore/
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD:?error}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHORE_ADMIN_NAME:-admin}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHORE_ADMIN_EMAIL:-admin@localhost}
      - SEMAPHORE_ADMIN=${SEMAPHORE_ADMIN:-admin}
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION=${SEMAPHORE_ACCESS_KEY_ENCRYPTION:?error}
      - ANSIBLE_HOST_KEY_CHECKING=false
    volumes:
      - /srv/dvls/semaphore_config:/etc/semaphore
      - /srv/dvls/semaphore_data:/var/lib/semaphore
      - /srv/dvls/semaphore_tmp:/tmp/semaphore
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.labels.role == secondary
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.semaphore.entrypoints=websecure"
        - "traefik.http.routers.semaphore.rule=Host(`semaphore.${DOMAIN_NAME}`)"
        - "traefik.http.routers.semaphore.tls=true"
        - "traefik.http.routers.semaphore.tls.certresolver=cloudflare"
        - "traefik.http.services.semaphore.loadbalancer.server.port=3000"
    networks:
      - hlel

