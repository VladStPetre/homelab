---
services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    ports:
      - "3001:3001"
    volumes:
      - uptime-data:/app/data
    environment:
      - TZ=${TIMEZONE}
      - UMASK=0022
    networks:
      - hlel
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.labels.role == secondary
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.uptime.rule=Host(`uptime.${DOMAIN_NAME}`)"
        - "traefik.http.routers.uptime.entrypoints=websecure"
        - "traefik.http.routers.uptime.tls=true"
        - "traefik.http.routers.uptime.tls.certresolver=cloudflare"
        - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  semaphore:
    image: semaphoreui/semaphore:v2.18.10
    environment:
      - SEMAPHORE_DB_DIALECT=sqlite
      - SEMAPHORE_DB=/etc/semaphore/semaphore.db
      - SEMAPHORE_PLAYBOOK_PATH=/tmp/semaphore/
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD:?error}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHORE_ADMIN_NAME:-admin}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHORE_ADMIN_EMAIL:-admin@localhost}
      - SEMAPHORE_ADMIN=${SEMAPHORE_ADMIN:-admin}
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION=${SEMAPHORE_ACCESS_KEY_ENCRYPTION:?error}
      - ANSIBLE_HOST_KEY_CHECKING=false
    volumes:
      - semaphore_config:/etc/semaphore
      - semaphore_data:/var/lib/semaphore
      - semaphore_tmp:/tmp/semaphore
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.labels.role == secondary
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.semaphore.entrypoints=websecure"
        - "traefik.http.routers.semaphore.rule=Host(`semaphore.${DOMAIN_NAME}`)"
        - "traefik.http.routers.semaphore.tls=true"
        - "traefik.http.routers.semaphore.tls.certresolver=cloudflare"
        - "traefik.http.services.semaphore.loadbalancer.server.port=3000"
    networks:
      - hlel

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.25.3
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${TIMEZONE}
    volumes:
      - n8n-data:/home/node/.n8n
      - n8n-local-files:/files
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN_NAME}`)"
        - "traefik.http.routers.n8n.entrypoints=websecure"
        - "traefik.http.routers.n8n.tls=true"
        - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
        - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      placement:
        constraints:
          - node.labels.role == secondary
    networks:
      - hlel


volumes:
  uptime-data: {}
  n8n-data: {}
  n8n-local-files: {}
  semaphore_config: {}
  semaphore_data: {}
  semaphore_tmp: {}

networks:
  hlel:
    name: hlel
    external: true