---
services:

  adguardhome:
    image: adguard/adguardhome:v0.107.77
    environment:
      - TZ=${TIMEZONE}
    ports:
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53
        published: 53
        protocol: tcp
        mode: host
    volumes:
      - /srv/dvls/adguard-work:/opt/adguardhome/work
      - /srv/dvls/adguard-conf:/opt/adguardhome/conf
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - SYS_TIME
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 1
        window: 30s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.labels.role == primary
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.adguard.rule=Host(`adguard.${DOMAIN_NAME}`)"
        - "traefik.http.routers.adguard.entrypoints=websecure"
        - "traefik.http.routers.adguard.tls=true"
        - "traefik.http.routers.adguard.tls.certresolver=cloudflare"
        - "traefik.http.services.adguard.loadbalancer.server.port=80"
    networks:
      hlel:
        ipv4_address: 172.21.0.109   # same IP your Pi-hole had

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=${TIMEZONE}
      # First-start setup only
#      - INIT_ENABLED=true
#      - INIT_USERNAME=admin
#      - INIT_PASSWORD=${WG_EASY_ADMIN_PASSWORD}
#      - INIT_HOST=${WG_SERVER_URL}
#      - INIT_PORT=${WG_SERVER_PORT}
#      - INIT_DNS=192.168.7.124
#      - INIT_IPV4_CIDR=10.13.13.0/24
#      - INIT_IPV6_CIDR=fd00:13:13::/64
      - WG_DEVICE=eth1
##
      # Web UI
      - PORT=51821
    ports:
      - target: 62931
        published: 62931
        protocol: udp
        mode: host
    volumes:
      - /srv/dvls/wireguard-data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    dns:
      - 192.168.7.124
    deploy:
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.wg-easy.rule=Host(`wg.${DOMAIN_NAME}`)"
        - "traefik.http.routers.wg-easy.entrypoints=websecure"
        - "traefik.http.routers.wg-easy.tls=true"
        - "traefik.http.routers.wg-easy.tls.certresolver=cloudflare"
        - "traefik.http.services.wg-easy.loadbalancer.server.port=51821"
      placement:
        constraints:
          - node.labels.role == primary
    networks:
      - hlel


  traefik:
    image: traefik:v3.7.1
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
      - "444:444"
    environment:
#      - CF_API_EMAIL=user@example.com
#      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_api_token
      - CLOUDFLARE_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    configs:
      - source: traefik_yaml_config
        target: /etc/traefik/traefik.yml
      - source: traefik_config_yaml_config
        target: /etc/traefik/config.yml
    volumes:
      - /srv/dvls/traefik-data:/etc/traefik
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN_NAME}`)"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.tls=true"
        - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
        - "traefik.http.routers.traefik.tls.domains[0].main=${DOMAIN_NAME}"
        - "traefik.http.routers.traefik.tls.domains[0].sans=*.${DOMAIN_NAME}"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.priority=10"
         # Satisfy Swarm provider: declare an explicit (unused) backend service/port.
         # It's OK because no router points to it.
        - "traefik.http.services.noop.loadbalancer.server.port=65535"

        # Authentik forward auth middleware
        - "traefik.http.routers.traefik.middlewares=authentik@swarm"
        - "traefik.http.middlewares.authentik.forwardauth.address=http://authentik_server:9000/outpost.goauthentik.io/auth/traefik"
        - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
        - "traefik.http.middlewares.authentik.forwardauth.authResponseHeadersRegex=^X-authentik-"

      placement:
        constraints:
          - node.labels.role == primary
    networks:
      hlel:
        ipv4_address: 172.21.0.102
      hlarr:


configs:
  traefik_yaml_config:
    external: true
  traefik_config_yaml_config:
    external: true

networks:
  hlel:
    name: hlel
    external: true
  hlarr:
    name: hlarr
    external: true