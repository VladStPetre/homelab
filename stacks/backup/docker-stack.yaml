---
services:
  backrest:
    image: garethgeorge/backrest:v1.13.0
    hostname: echo
    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TMPDIR=/tmp
      - TZ=${TIMEZONE}
    volumes:
      # Backrest internal state
      - /srv/dvls/backrest_data:/data
      - /srv/dvls/backrest_config:/config
      - /srv/dvls/backrest_cache:/cache
      - /srv/dvls/backrest_tmp:/tmp
      # nas - destination
      - /mnt/nas/bkp:/data/qnas/bkp
      # Mount the SAME service volumes read-only so Backrest can back them up
      - /srv/dvls/ha-data:/data/ha-data:ro
      - /srv/dvls/influxdb2-data:/data/influxdb2-data:ro
      - /srv/dvls/z2m-data:/data/z2m-data:ro
      - /srv/dvls/grafana-data:/data/grafana-data:ro
      - /srv/dvls/prometheus-data:/data/prometheus-data:ro
      - /srv/dvls/syncthing_src_config:/data/syncthing_src:ro
      - /srv/dvls/syncthing_storage_config:/data/syncthing_storage:ro
      - /srv/dvls/syncthing_nas_config:/data/syncthing_nas:ro
      - /srv/dvls/sonarr-config:/data/sonarr-config:ro
      - /srv/dvls/radarr-config:/data/radarr-config:ro
      - /srv/dvls/bazarr-config:/data/bazarr-config:ro
      - /srv/dvls/prowlarr-config:/data/prowlarr-config:ro
      - /srv/dvls/jellyfin-config:/data/jellyfin-config:ro
      - /srv/dvls/qbittorrent-config:/data/qbittorrent-config:ro
      - immich_library:/data/immich_library:ro

    deploy:
      restart_policy:
        condition: on-failure
        delay: 300s          # wait 60s between restarts
        max_attempts: 5    # stop restarting after 10 tries
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.backrest.rule=Host(`backrest.${DOMAIN_NAME}`)"
        - "traefik.http.routers.backrest.entrypoints=websecure"
        - "traefik.http.routers.backrest.tls=true"
        - "traefik.http.routers.backrest.tls.certresolver=cloudflare"
        - "traefik.http.services.backrest.loadbalancer.server.port=9898"
        # helpful for service discovery / ops
        - "com.backups.role=backrest"
      placement:
        constraints:
          - node.labels.role == primary
    networks:
      - hlel

  syncthing-src:
    image: lscr.io/linuxserver/syncthing:2.1.1
    ports:
      - "22000:22000/tcp"   # Sync TCP
      - "22000:22000/udp"   # Sync QUIC/UDP
      - "21027:21027/udp"   # Local discovery
    environment:
      - PUID=${CUID}
      - PGID=${CGID}
      - TZ=${TIMEZONE}
      - UMASK=002
      - GUI_ADDRESS=0.0.0.0:8384
    volumes:
      - /srv/dvls/syncthing_src_config:/config
      - immich_library:/data/immich_library:ro
      - /mnt/nas_Vlad:/data/_Vlad:ro
      - /mnt/nas_Rux:/data/_Rux:ro
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.syncthing-src.rule=Host(`syncthing-src.${DOMAIN_NAME}`)"
        - "traefik.http.routers.syncthing-src.entrypoints=websecure"
        - "traefik.http.routers.syncthing-src.tls=true"
        - "traefik.http.routers.syncthing-src.tls.certresolver=cloudflare"
        - "traefik.http.services.syncthing-src.loadbalancer.server.port=8384"
      placement:
        constraints:
          - node.labels.role == primary
    networks:
      - hlel

  syncthing-storage:
    image: lscr.io/linuxserver/syncthing:2.1.1
    ports:
      - "22001:22000/tcp"   # Sync TCP
      - "22001:22000/udp"   # Sync QUIC/UDP
      - "21028:21027/udp"   # Local discovery
    environment:
      - PUID=${CUID}
      - PGID=${CGID}
      - TZ=${TIMEZONE}
      - UMASK=002
      - GUI_ADDRESS=0.0.0.0:8384
    volumes:
      - /srv/dvls/syncthing_storage_config:/config
      - /mnt/vext2tb/_Vlad:/data/vext2tb/_Vlad
      - /mnt/vext2tb/_Rux:/data/vext2tb/_Rux
      - /mnt/vext2tb/srv/immich:/data/vext2tb/srv/immich
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.syncthing-storage.rule=Host(`syncthing-storage.${DOMAIN_NAME}`)"
        - "traefik.http.routers.syncthing-storage.entrypoints=websecure"
        - "traefik.http.routers.syncthing-storage.tls=true"
        - "traefik.http.routers.syncthing-storage.tls.certresolver=cloudflare"
        - "traefik.http.services.syncthing-storage.loadbalancer.server.port=8384"
      placement:
        constraints:
          - node.labels.role == primary
    networks:
      - hlel

  syncthing-nas:
    image: lscr.io/linuxserver/syncthing:2.1.1
    ports:
      - "22002:22000/tcp"   # Sync TCP
      - "22002:22000/udp"   # Sync QUIC/UDP
      - "21029:21027/udp"   # Local discovery
    environment:
      - PUID=${CUID}
      - PGID=${CGID}
      - TZ=${TIMEZONE}
      - UMASK=002
      - GUI_ADDRESS=0.0.0.0:8384
    volumes:
      - /srv/dvls/syncthing_nas_config:/config
      - /mnt/nas/immich:/data/qnas/immich
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "portainer.io/managed=true"
        - "io.portainer.accesscontrol.users=admin"
        - "traefik.enable=true"
        - "traefik.swarm.network=hlel"
        - "traefik.http.routers.syncthing-nas.rule=Host(`syncthing-nas.${DOMAIN_NAME}`)"
        - "traefik.http.routers.syncthing-nas.entrypoints=websecure"
        - "traefik.http.routers.syncthing-nas.tls=true"
        - "traefik.http.routers.syncthing-nas.tls.certresolver=cloudflare"
        - "traefik.http.services.syncthing-nas.loadbalancer.server.port=8384"
      placement:
        constraints:
          - node.labels.role == primary
    networks:
      - hlel

volumes:
  # Reuse the SAME volume names your services use.
  immich_library:
    external: true
  semaphore_config:
    external: true
  semaphore_data:
    external: true
  uptime-data:
    external: true

networks:
  hlel:
    name: hlel
    external: true
