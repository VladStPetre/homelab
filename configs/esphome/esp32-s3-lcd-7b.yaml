esphome:
  name: esp32-s3-lcd-7b
  friendly_name: esp32-s3-lcd-7b

psram:
  mode: octal
  speed: 80Mhz

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "sOXuW4k6R8kE068BVqUeTvKqWuvyfxqywpk1zfe5mTQ="

ota:
  - platform: esphome
    password: "8fb0182a7e50cc6e128658786a93382a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.7.178

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-S3-Lcd-7B Fallback Hotspot"
    password: "JWJjR0hqOUMM"

captive_portal:


#-------------------------------------------
# IO Extender
#-------------------------------------------
external_components:
  - source: github://pr#10071
    components: [waveshare_io_ch32v003]
    refresh: 0s

waveshare_io_ch32v003:
  id: waveshare_io_hub
  i2c_id: bus_a
  address: 0x24

#-------------------------------------------
# Touchscreen gt911
#-------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO08
    scl: GPIO09
    scan: true

touchscreen:
  platform: gt911
  id: my_touchscreen
  display: my_display
  i2c_id: bus_a
  interrupt_pin: GPIO4
  reset_pin:
    waveshare_io_ch32v003: waveshare_io_hub
    number: 1
    mode: OUTPUT
      # on_touch:
      # - lambda: |-
      # ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
      # on_update:
      # - lambda: |-
      # for (auto touch: touches)  {
      # if (touch.state <= 2) {
    # ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
    # }
    # }

#-------------------------------------------
# Display
#-------------------------------------------
display:
  - platform: rpi_dpi_rgb
    id: my_display
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 30MHZ
    dimensions:
      width: 1024
      height: 600
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: true
    reset_pin:
      waveshare_io_ch32v003: waveshare_io_hub
      number: 3
    hsync_back_porch: 152
    hsync_front_porch: 48
    hsync_pulse_width: 162
    vsync_back_porch: 13
    vsync_front_porch: 3
    vsync_pulse_width: 45
    data_pins:
      red:
        - 1         #r3
        - 2         #r4
        - 42        #r5
        - 41        #r6
        - 40        #r7
      blue:
        - 14        #b3
        - 38        #b4
        - 18        #b5
        - 17        #b6
        - 10        #b7
      green:
        - 39        #g2
        - 0         #g3
        - 45        #g4
        - 48        #g5
        - 47        #g6
        - 21        #g7

  # ── Backlight (PWM) ────────────────────────────────────────
  #output:
  #  - platform: ledc
  #    id: backlight_pwm
  #    pin: GPIO45
  #    frequency: 1000Hz

  #light:
  #  - platform: monochromatic
  #    id: backlight
  #    name: "Display Backlight"
  #    output: backlight_pwm
  #    restore_mode: ALWAYS_ON
  #    initial_value: 0.9

  # ══════════════════════════════════════════════════════════
  #  Home Assistant sensor proxies
  # ══════════════════════════════════════════════════════════

sensor:
  - platform: homeassistant
    id: temp_living
    entity_id: sensor.lumi_de_lumi_158d0003cb2d31_v1_temperature_p_2_1
    unit_of_measurement: "°C"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_living_temp
            text: !lambda 'return str_sprintf("%.1f°C", x);'

  - platform: homeassistant
    id: temp_bedroom
    entity_id: sensor.lumi_de_lumi_158d000391d212_v1_temperature_p_2_1
    unit_of_measurement: "°C"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_bedroom_temp
            text: !lambda 'return str_sprintf("%.1f°C", x);'

  - platform: homeassistant
    id: temp_kitchen
    entity_id: sensor.kitchen_temperature
    unit_of_measurement: "°C"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_kitchen_temp
            text: !lambda 'return str_sprintf("%.1f°C", x);'

  - platform: homeassistant
    id: hum_living
    entity_id: sensor.lumi_de_lumi_158d0003cb2d31_v1_relative_humidity_p_2_2
    unit_of_measurement: "%"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_living_hum
            text: !lambda 'return str_sprintf("%.0f%%", x);'

  - platform: homeassistant
    id: hum_bedroom
    entity_id: sensor.lumi_de_lumi_158d000391d212_v1_relative_humidity_p_2_2
    unit_of_measurement: "%"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_bedroom_hum
            text: !lambda 'return str_sprintf("%.0f%%", x);'

  - platform: homeassistant
    id: hum_kitchen
    entity_id: sensor.kitchen_humidity
    unit_of_measurement: "%"
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_kitchen_hum
            text: !lambda 'return str_sprintf("%.0f%%", x);'

switch:
  - platform: homeassistant
    id: light_living_state
    entity_id: switch.chuangmi_de_235932589_hmi206_on_p_2_1
    on_turn_on:
      then:
        - lvgl.widget.update:
            id: btn_light_living
            state:
              checked: true
    on_turn_off:
      then:
        - lvgl.widget.update:
            id: btn_light_living
            state:
              checked: false

  - platform: homeassistant
    id: light_bedroom_state
    entity_id: switch.lumi_zigbee_plug_mmeu01
    on_turn_on:
      then:
        - lvgl.widget.update:
            id: btn_light_bedroom
            state:
              checked: true
    on_turn_off:
      then:
        - lvgl.widget.update:
            id: btn_light_bedroom
            state:
              checked: false

  # - platform: homeassistant
