# ══════════════════════════════════════════════════════════
#  LVGL UI  —  1024 × 768
#
#  Layout (px):
#  ┌─────────────────────────────────────────────────────┐
#  │  HEADER  y:0  h:64                       w:1024     │
#  ├─────────────────────────────────────────────────────┤
#  │  "CLIMATE"  y:76                                    │
#  │  [Living 316×220] [Bedroom 316×220] [Kitchen 316×220]│ y:100
#  ├─────────────────────────────────────────────────────┤
#  │  "LIGHTS"  y:342                                    │
#  │  [Living 316×382] [Bedroom 316×382] [Kitchen 316×382]│ y:366
#  └─────────────────────────────────────────────────────┘
#  Columns:  x1=16  x2=344  x3=672   (12px gaps)
#
#  FIX NOTES vs previous version:
#  1. theme key: [btn] → [button]  (ESPHome LVGL uses full widget names)
#  2. align: RIGHT → align: RIGHT_MID  (RIGHT alone is not a valid LVGL align)
#  3. align: BOTTOM_LEFT → align: BOTTOM_LEFT  (this one is valid, kept)
#  4. Removed shadow_* from obj cards — only supported on btn/panel in ESPHome LVGL
#  5. clip_corner moved inside styles block where required by ESPHome LVGL schema
# ══════════════════════════════════════════════════════════
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen

  buffer_size: 78%
  full_refresh: false

  # ── Global theme ────────────────────────────────────────
  # FIX 1: key is [button], not [btn]
  theme:
    button:
      bg_color: 0x1E3A5F
      bg_grad_color: 0x0D1F3C
      bg_grad_dir: VER
      border_color: 0x4A90D9
      border_width: 1
      text_color: 0xFFFFFF
      radius: 16
      checked:
        bg_color: 0xF5A623
        bg_grad_color: 0xD4891E
        border_color: 0xFFCC66
        text_color: 0x1A1A1A

  pages:
    - id: main_page
      bg_color: 0x0B1628
      bg_opa: COVER

      widgets:

        # ══════════════════════════════════════════════════
        #  HEADER BAR  1024 × 64
        # ══════════════════════════════════════════════════
        - obj:
            x: 0
            y: 0
            width: 1024
            height: 64
            bg_color: 0x0D1F3C
            border_width: 0
            pad_all: 0
            radius: 0

            widgets:
              - label:
                  x: 28
                  y: 16
                  text: "Home Dashboard"
                  text_font: montserrat_32
                  text_color: 0xF0F4FF

              # FIX 2: align RIGHT → RIGHT_MID; use positive x offset from right edge
              - label:
                  id: lbl_clock
                  align: RIGHT_MID
                  x: -28
                  y: 0
                  text: "--:--"
                  text_font: montserrat_24
                  text_color: 0x8BA8CC

        # ══════════════════════════════════════════════════
        #  SECTION LABEL: CLIMATE
        # ══════════════════════════════════════════════════
        - label:
            x: 28
            y: 76
            text: "CLIMATE"
            text_font: montserrat_16
            text_color: 0x4A90D9

        # ── Climate Card: Living Room ──────────────────────
        - obj:
            id: card_living
            x: 16
            y: 100
            width: 316
            height: 220
            bg_color: 0x132040
            border_color: 0x1E3A5F
            border_width: 1
            radius: 20
            pad_all: 0

            widgets:
              - label:
                  x: 20
                  y: 14
                  text: "Living Room"
                  text_font: montserrat_22
                  text_color: 0xF0F4FF
              - label:
                  x: 20
                  y: 60
                  text: "Temp"
                  text_font: montserrat_14
                  text_color: 0x8BA8CC
              - label:
                  id: lbl_living_temp
                  x: 20
                  y: 80
                  text: "--.-°C"
                  text_font: montserrat_36
                  text_color: 0xF5A623
              - label:
                  x: 20
                  y: 138
                  text: "Humidity"
                  text_font: montserrat_14
                  text_color: 0x8BA8CC
              - label:
                  id: lbl_living_hum
                  x: 20
                  y: 158
                  text: "--%"
                  text_font: montserrat_28
                  text_color: 0x4A90D9

        # ── Climate Card: Bedroom ──────────────────────────
        - obj:
            id: card_bedroom
            x: 344
            y: 100
            width: 316
            height: 220
            bg_color: 0x132040
            border_color: 0x1E3A5F
            border_width: 1
            radius: 20
            pad_all: 0

            widgets:
              - label:
                  x: 20
                  y: 14
                  text: "Bedroom"
                  text_font: montserrat_22
                  text_color: 0xF0F4FF
              - label:
                  x: 20
                  y: 60
                  text: "Temp"
                  text_font: montserrat_14
                  text_color: 0x8BA8CC
              - label:
                  id: lbl_bedroom_temp
                  x: 20
