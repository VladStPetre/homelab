# ══════════════════════════════════════════════════════════
#  Clock (synced from Home Assistant)
# ══════════════════════════════════════════════════════════
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: update_clock
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: update_clock

script:
  - id: update_clock
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |
            auto now = id(ha_time).now();
            return str_sprintf("%02d:%02d", now.hour, now.minute);

